<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nakshatra Guide Dashboard</title>
    <link rel="stylesheet" href="style.css?v=103">
</head>
<body>

    <canvas id="starfield-bg"></canvas>

    <div class="dashboard-container">
        
        <div class="dashboard-row-three-columns">
            
            <div class="card branding-card-panel">
                <div class="branding-image-container">
                    <img src="ng head.jpg" alt="Nakshatra Guide Header" class="scaled-panel-img">
                </div>
            </div>

            <div class="card outlined-card">
                <div class="card-header">Astrological Profile</div>
                <div class="card-body">
                    <div class="form-group">
                        <label for="dob">Date of Birth (DD-MM-YYYY)</label>
                        <input type="text" id="dob" placeholder="DD-MM-YYYY" maxlength="10" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="tob">Time of Birth</label>
                        <input type="time" id="tob" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="birth-place-input">Place of Birth</label>
                        <input type="text" id="birth-place-input" placeholder="City" value="Chennai">
                    </div>
                    
                    <button id="submitBtn" class="btn primary-btn">Submit</button>
                </div>
            </div>

            <div class="card outlined-card">
                <div class="card-header">Detected Nakshatra</div>
                <div class="card-body">
                    <div id="detectedNakshatra" class="highlight-text">Waiting for Birth Details</div>
                    <div id="detectedPada" class="sub-highlight-text"></div>
                    <div id="activeForecastDateDisplay" style="margin-top: 4px; font-size: 0.88rem; color: rgba(255, 204, 0, 0.85); font-weight: bold;"></div>
                    
                    <div class="rasi-zodiac-details" style="margin-top: 15px;">
                        <div>Vedic Moon Sign (Rasi): <strong id="vedicRasi">-</strong></div>
                        <div style="margin-top: 8px;">Western Sun Sign: <strong id="westernZodiac">-</strong></div>
                    </div>
                    
                    <div class="action-buttons-group" style="margin-top: 20px;">
                        <button id="confirmBtn" style="display: none;" class="btn confirm-btn">Confirm</button>
                        <button id="rejectBtn" style="display: none;" class="btn reject-btn">Reject</button>
                        <button id="resetBtn" style="display: none;" class="btn reset-btn">Reset Profile and enter fresh data</button>
                    </div>
                </div>
            </div>

        </div>

        <hr class="golden-dashboard-divider">

        <!-- Mobile-Only Swapping Header Submenu -->
        <div id="mobile-navigation-bar" style="display: none; overflow-x: auto; white-space: nowrap; padding: 10px 5px; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); scrollbar-width: none; -webkit-overflow-scrolling: touch;">
            <button class="nav-tab" onclick="switchMobileTab('forecast')" style="background: none; border: none; color: #ffffff; padding: 8px 16px; font-family: inherit; font-size: 1rem; cursor: pointer; font-weight: bold;">Forecast</button>
            <button class="nav-tab" onclick="switchMobileTab('tips')" style="background: none; border: none; color: rgba(255,255,255,0.6); padding: 8px 16px; font-family: inherit; font-size: 1rem; cursor: pointer;">Transit Tips</button>
            <button class="nav-tab" onclick="switchMobileTab('important')" style="background: none; border: none; color: rgba(255,255,255,0.6); padding: 8px 16px; font-family: inherit; font-size: 1rem; cursor: pointer;">Important</button>
            <button class="nav-tab" onclick="switchMobileTab('history')" style="background: none; border: none; color: rgba(255,255,255,0.6); padding: 8px 16px; font-family: inherit; font-size: 1rem; cursor: pointer;">History</button>
        </div>

        <!-- 4 Equal Panels Container Grid Grid Engine -->
       <div id="forecastAndAttentionPanels" style="display: none; margin-top: 20px;">
            
            <!-- Panel 1: Daily Forecast -->
            <div class="card" id="card-forecast">
                <div class="card-header">
                    <h3>Daily Forecast</h3>
                </div>
                <div class="card-body">
                    <div id="forecastBox">Calculating coordinates...</div>
                </div>
            </div>

            <!-- Panel 2: Dynamic Transit Tips & Caution Note -->
            <div class="card" id="mobile-tips-card">
                <!-- Data dynamically inserted here by index_app.js -->
            </div>

            <!-- Panel 3: Important Guide -->
            <div class="card" id="card-important">
                <div class="card-header">
                    <h3>Important Guide</h3>
                </div>
                <div class="card-body">
                    <strong>Lucky Color:</strong> <span id="luckyColor">-</span><br>
                    <strong>Lucky Number:</strong> <span id="luckyNumber">-</span><br>
                    <strong>Favorable time:</strong> <span id="goodTime">-</span><br>
                    <strong>Unfavorable time:</strong> <span id="badTime">-</span>
                </div>
            </div>

            <!-- Panel 4: History Snapshot Lookup -->
            <div class="card" id="card-history">
                <div class="card-header">
                    <h3>History</h3>
                </div>
                <div class="card-body">
                    <div id="attentionBox"></div>
                </div>
            </div>
            
        </div>

    </div>

    <script type="module" src="js/index_app.js?v=108"></script>
</body>
</html>
